<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
</head>
<body>

<h2>Add Question</h2>

<form method="POST">

    <input type="text"
           name="subject"
           placeholder="Subject"
           required>

    <br><br>

    <input type="text"
           name="question"
           placeholder="Question"
           required>

    <br><br>

    <input type="text"
           name="option1"
           placeholder="Option 1"
           required>

    <br><br>

    <input type="text"
           name="option2"
           placeholder="Option 2"
           required>

    <br><br>

    <input type="text"
           name="option3"
           placeholder="Option 3"
           required>

    <br><br>

    <input type="text"
           name="option4"
           placeholder="Option 4"
           required>

    <br><br>

    <input type="text"
           name="correct"
           placeholder="Correct Answer (A/B/C/D)"
           required>

    <br><br>

    <button type="submit">
        Add Question
    </button>

</form>

</body>
</html>
