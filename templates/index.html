<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    padding: 20px;
    background-color: #f5f5f5;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h3 {
    margin-bottom: 20px;
}

.progress {
    margin-bottom: 15px;
    font-size: 14px;
    color: #555;
}

button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #007BFF;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

.footer {
    text-align: center;
    margin-top: 15px;
    color: gray;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

    <!-- ✅ UPDATED PROGRESS -->
    <div class="progress">
        Attempted: {{ attempted }} |
        Remaining: {{ remaining }} |
        Total: {{ attempted + remaining }}
    </div>

    <h3>Q{{ q.id }}. {{ q.question }}</h3>

    <form method="POST" action="/answer">
        {% for opt in q.options %}
            <button type="submit" name="answer" value="{{ loop.index0 }}">
                {{ opt }}
            </button>
        {% endfor %}
    </form>

    <div class="footer">
        Smart MCQ System 🚀
    </div>

</div>

</body>
</html>
